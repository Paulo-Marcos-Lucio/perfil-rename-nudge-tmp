<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 1280 560" width="1280" height="560" role="img" aria-label="Mapa de cobertura da su&#237;te AppSec &#8212; cinco ferramentas independentes alimentando o n&#250;cleo OWASP Top 10 e LGPD art. 46">
  <title>Su&#237;te AppSec &#8212; mapa de cobertura</title>
  <defs>
    <linearGradient id="brand" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#2dd4bf"/>
      <stop offset="0.52" stop-color="#38bdf8"/>
      <stop offset="1" stop-color="#818cf8"/>
    </linearGradient>
    <linearGradient id="brandIco" gradientUnits="userSpaceOnUse" x1="0" y1="0" x2="24" y2="24">
      <stop offset="0" stop-color="#2dd4bf"/>
      <stop offset="0.52" stop-color="#38bdf8"/>
      <stop offset="1" stop-color="#818cf8"/>
    </linearGradient>
    <radialGradient id="glowTop" cx="0.5" cy="0" r="0.9">
      <stop offset="0" stop-color="#2dd4bf" stop-opacity="0.16"/>
      <stop offset="1" stop-color="#2dd4bf" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid" width="34" height="34" patternUnits="userSpaceOnUse">
      <path d="M34 0 H0 V34" fill="none" stroke="#18212c" stroke-width="1"/>
    </pattern>
    <clipPath id="panelClip">
      <rect x="1.5" y="1.5" width="1277" height="557" rx="15"/>
    </clipPath>
    <!-- geometria dos tra&#231;os: definida UMA vez; <use> estiliza, <mpath> anima (dois paths, sempre) -->
    <path id="tp1" d="M144 340 V295 L189 250 H475 L520 205 V176" fill="none"/>
    <path id="tp2" d="M392 340 V312 L414 290 H558 L580 268 V176" fill="none"/>
    <path id="tp3" d="M640 340 V176" fill="none"/>
    <path id="tp4" d="M888 340 V312 L866 290 H722 L700 268 V176" fill="none"/>
    <path id="tp5" d="M1136 340 V295 L1091 250 H805 L760 205 V176" fill="none"/>
  </defs>

  <!-- painel -->
  <rect x="1" y="1" width="1278" height="558" rx="16" fill="#0b0f14" stroke="#212a34"/>
  <g clip-path="url(#panelClip)">
    <rect x="1.5" y="1.5" width="1277" height="557" fill="url(#grid)" opacity="0.35"/>
    <rect x="1.5" y="1.5" width="1277" height="380" fill="url(#glowTop)">
      <animate attributeName="opacity" values="0.63;1;0.63" keyTimes="0;0.5;1" dur="9s" repeatCount="indefinite"/>
    </rect>
  </g>

  <g font-family="'JetBrains Mono','Cascadia Code',ui-monospace,'SF Mono',Menlo,Consolas,monospace">

    <!-- legenda topo -->
    <text x="36" y="36" font-size="13" letter-spacing="2" fill="#67727e">SU&#205;TE APPSEC &#183; MAPA DE COBERTURA</text>

    <!-- tra&#231;os PCB (inst&#226;ncia estilizada da geometria) -->
    <g fill="none" stroke="#1f2f3a" stroke-width="1.5" stroke-linejoin="round" stroke-linecap="round">
      <use xlink:href="#tp1"/>
      <use xlink:href="#tp2"/>
      <use xlink:href="#tp3"/>
      <use xlink:href="#tp4"/>
      <use xlink:href="#tp5"/>
    </g>

    <!-- vias nas dobras -->
    <g fill="#212a34" stroke="#2dd4bf" stroke-width="1">
      <circle cx="144" cy="295" r="3"/><circle cx="189" cy="250" r="3"/><circle cx="475" cy="250" r="3"/><circle cx="520" cy="205" r="3"/>
      <circle cx="392" cy="312" r="3"/><circle cx="414" cy="290" r="3"/><circle cx="558" cy="290" r="3"/><circle cx="580" cy="268" r="3"/>
      <circle cx="888" cy="312" r="3"/><circle cx="866" cy="290" r="3"/><circle cx="722" cy="290" r="3"/><circle cx="700" cy="268" r="3"/>
      <circle cx="1136" cy="295" r="3"/><circle cx="1091" cy="250" r="3"/><circle cx="805" cy="250" r="3"/><circle cx="760" cy="205" r="3"/>
    </g>

    <!-- FLUXO: pacotes de luz, sempre do cart&#227;o PARA o hub -->
    <g opacity="0">
      <circle r="6" fill="#2dd4bf" opacity="0.3"/>
      <circle r="3" fill="#ffffff" opacity="0.6"/>
      <animateMotion dur="6.5s" begin="0s" repeatCount="indefinite"><mpath xlink:href="#tp1" href="#tp1"/></animateMotion>
      <animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.07;0.9;1" dur="6.5s" begin="0s" repeatCount="indefinite"/>
    </g>
    <g opacity="0">
      <circle r="6" fill="#2dd4bf" opacity="0.3"/>
      <circle r="3" fill="#ffffff" opacity="0.6"/>
      <animateMotion dur="5.2s" begin="1.3s" repeatCount="indefinite"><mpath xlink:href="#tp2"/></animateMotion>
      <animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.07;0.9;1" dur="5.2s" begin="1.3s" repeatCount="indefinite"/>
    </g>
    <g opacity="0">
      <circle r="6" fill="#2dd4bf" opacity="0.3"/>
      <circle r="3" fill="#ffffff" opacity="0.6"/>
      <animateMotion dur="5.9s" begin="2.6s" repeatCount="indefinite"><mpath xlink:href="#tp3"/></animateMotion>
      <animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.07;0.9;1" dur="5.9s" begin="2.6s" repeatCount="indefinite"/>
    </g>
    <g opacity="0">
      <circle r="6" fill="#2dd4bf" opacity="0.3"/>
      <circle r="3" fill="#ffffff" opacity="0.6"/>
      <animateMotion dur="6.5s" begin="3.9s" repeatCount="indefinite"><mpath xlink:href="#tp4"/></animateMotion>
      <animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.07;0.9;1" dur="6.5s" begin="3.9s" repeatCount="indefinite"/>
    </g>
    <g opacity="0">
      <circle r="6" fill="#2dd4bf" opacity="0.3"/>
      <circle r="3" fill="#ffffff" opacity="0.6"/>
      <animateMotion dur="7s" begin="5.2s" repeatCount="indefinite"><mpath xlink:href="#tp5"/></animateMotion>
      <animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.07;0.9;1" dur="7s" begin="5.2s" repeatCount="indefinite"/>
    </g>

    <!-- HUB -->
    <rect x="480" y="84" width="320" height="92" rx="12" fill="#0e1420" stroke="url(#brand)" stroke-width="1.5"/>
    <g transform="translate(553,111.3) scale(0.583)">
      <path d="M32 8 L52 16 V32 C52 44 43 52 32 56 C21 52 12 44 12 32 V16 Z" fill="url(#brand)"/>
      <path d="M23 32.5 l6.5 6.5 L42 26.5" fill="none" stroke="#04110f" stroke-width="4.5" stroke-linecap="round" stroke-linejoin="round"/>
    </g>
    <text x="603" y="124" font-size="16" font-weight="700" fill="#e6edf3">OWASP TOP 10</text>
    <text x="603" y="147" font-size="13" fill="#67727e">LGPD ART. 46</text>
    <!-- pads de chegada na base do hub -->
    <g fill="#212a34" stroke="#2dd4bf" stroke-width="1">
      <circle cx="520" cy="176" r="3"/><circle cx="580" cy="176" r="3"/><circle cx="640" cy="176" r="3"/><circle cx="700" cy="176" r="3"/><circle cx="760" cy="176" r="3"/>
    </g>

    <!-- CART&#195;O 1 &#8212; SENTINELA -->
    <g transform="translate(26,340)">
      <animate attributeName="opacity" values="0;1;1" keyTimes="0;0.213;1" dur="1.5s" begin="0s" fill="freeze"/>
      <animateTransform attributeName="transform" type="translate" additive="sum" values="0 6;0 0;0 0" keyTimes="0;0.213;1" dur="1.5s" begin="0s" fill="freeze"/>
      <rect x="0.5" y="0.5" width="235" height="159" rx="12" fill="#0e1420" stroke="#212a34"/>
      <circle cx="118" cy="0.5" r="3" fill="#212a34" stroke="#2dd4bf" stroke-width="1"/>
      <g transform="translate(20,16)" fill="none" stroke="url(#brandIco)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M12 2.5 L20.5 6 V12 C20.5 17.3 17.2 20.7 12 22 C6.8 20.7 3.5 17.3 3.5 12 V6 Z"/>
        <path d="M8.2 12.3 L11 15.1 L16 9.4"/>
      </g>
      <text x="20" y="72" font-size="16" font-weight="700" fill="#e6edf3">SENTINELA</text>
      <text x="20" y="98" font-size="13" fill="#67727e">per&#237;metro web &#183; Python</text>
      <rect x="20" y="109" width="142" height="21" rx="4" fill="#2dd4bf" fill-opacity="0.12" stroke="#2dd4bf" stroke-opacity="0.35" stroke-width="1"/>
      <text x="91" y="124" text-anchor="middle" font-size="13" font-weight="700" fill="#2dd4bf" textLength="128" lengthAdjust="spacingAndGlyphs">[ N&#195;O-INTRUSIVO ]</text>
      <text x="20" y="144" font-size="13" fill="#67727e">150+ testes &#183; MIT</text>
    </g>

    <!-- CART&#195;O 2 &#8212; GUARDI&#195;O -->
    <g transform="translate(274,340)">
      <animate attributeName="opacity" values="0;0;1;1" keyTimes="0;0.1;0.313;1" dur="1.5s" begin="0s" fill="freeze"/>
      <animateTransform attributeName="transform" type="translate" additive="sum" values="0 6;0 6;0 0;0 0" keyTimes="0;0.1;0.313;1" dur="1.5s" begin="0s" fill="freeze"/>
      <rect x="0.5" y="0.5" width="235" height="159" rx="12" fill="#0e1420" stroke="#212a34"/>
      <circle cx="118" cy="0.5" r="3" fill="#212a34" stroke="#2dd4bf" stroke-width="1"/>
      <g transform="translate(20,16)" fill="none" stroke="url(#brandIco)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="7" cy="17" r="4.3"/>
        <path d="M10.1 13.9 L21 3"/>
        <path d="M16.2 7.8 l3.1 3.1"/>
      </g>
      <text x="20" y="72" font-size="16" font-weight="700" fill="#e6edf3">GUARDI&#195;O</text>
      <text x="20" y="98" font-size="13" fill="#67727e">segredos &#183; Python</text>
      <text x="20" y="124" font-size="13" font-weight="700" fill="#2dd4bf">CPF/CNPJ &#183; LGPD</text>
      <text x="20" y="144" font-size="13" fill="#67727e">40+ testes &#183; SARIF</text>
    </g>

    <!-- CART&#195;O 3 &#8212; CHAVEIRO -->
    <g transform="translate(522,340)">
      <animate attributeName="opacity" values="0;0;1;1" keyTimes="0;0.2;0.413;1" dur="1.5s" begin="0s" fill="freeze"/>
      <animateTransform attributeName="transform" type="translate" additive="sum" values="0 6;0 6;0 0;0 0" keyTimes="0;0.2;0.413;1" dur="1.5s" begin="0s" fill="freeze"/>
      <rect x="0.5" y="0.5" width="235" height="159" rx="12" fill="#0e1420" stroke="#212a34"/>
      <circle cx="118" cy="0.5" r="3" fill="#212a34" stroke="#2dd4bf" stroke-width="1"/>
      <g transform="translate(20,16)" fill="none" stroke="url(#brandIco)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <rect x="4.5" y="10.8" width="15" height="9.7" rx="2"/>
        <path d="M8 10.8 V7.6 a4 4 0 0 1 8 0 V10.8"/>
        <path d="M12 14.6 v2.2"/>
      </g>
      <text x="20" y="72" font-size="16" font-weight="700" fill="#e6edf3">CHAVEIRO</text>
      <text x="20" y="98" font-size="13" fill="#67727e" textLength="192" lengthAdjust="spacingAndGlyphs">autentica&#231;&#227;o JWT &#183; Python</text>
      <text x="20" y="144" font-size="13" fill="#67727e">40+ testes</text>
    </g>

    <!-- CART&#195;O 4 &#8212; ESTEIRA -->
    <g transform="translate(770,340)">
      <animate attributeName="opacity" values="0;0;1;1" keyTimes="0;0.3;0.513;1" dur="1.5s" begin="0s" fill="freeze"/>
      <animateTransform attributeName="transform" type="translate" additive="sum" values="0 6;0 6;0 0;0 0" keyTimes="0;0.3;0.513;1" dur="1.5s" begin="0s" fill="freeze"/>
      <rect x="0.5" y="0.5" width="235" height="159" rx="12" fill="#0e1420" stroke="#212a34"/>
      <circle cx="118" cy="0.5" r="3" fill="#212a34" stroke="#2dd4bf" stroke-width="1"/>
      <g transform="translate(20,16)" fill="none" stroke="url(#brandIco)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="9" cy="12" r="3.4"/>
        <path d="M9 7.6 V5.4 M9 16.4 V18.6 M12.8 14.2 L14.7 15.3 M5.2 14.2 L3.3 15.3 M5.2 9.8 L3.3 8.7 M12.8 9.8 L14.7 8.7"/>
        <path d="M16.8 12 H22.2 M19.9 9.7 L22.2 12 L19.9 14.3"/>
      </g>
      <text x="20" y="72" font-size="16" font-weight="700" fill="#e6edf3">ESTEIRA</text>
      <text x="20" y="98" font-size="13" fill="#67727e">CI/CD &#183; GitHub Actions</text>
      <text x="20" y="144" font-size="13" fill="#67727e">80+ testes &#183; SARIF</text>
    </g>

    <!-- CART&#195;O 5 &#8212; LABORAT&#211;RIO OWASP -->
    <g transform="translate(1018,340)">
      <animate attributeName="opacity" values="0;0;1;1" keyTimes="0;0.4;0.613;1" dur="1.5s" begin="0s" fill="freeze"/>
      <animateTransform attributeName="transform" type="translate" additive="sum" values="0 6;0 6;0 0;0 0" keyTimes="0;0.4;0.613;1" dur="1.5s" begin="0s" fill="freeze"/>
      <rect x="0.5" y="0.5" width="235" height="159" rx="12" fill="#0e1420" stroke="#212a34"/>
      <circle cx="118" cy="0.5" r="3" fill="#212a34" stroke="#2dd4bf" stroke-width="1"/>
      <g transform="translate(20,16)" fill="none" stroke="url(#brandIco)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M9.4 2.8 H14.6 M10.4 2.8 V8.4 L5.4 20.8 H18.6 L13.6 8.4 V2.8"/>
        <path d="M7.9 16 H16.1"/>
      </g>
      <text x="20" y="72" font-size="16" font-weight="700" fill="#e6edf3">LABORAT&#211;RIO OWASP</text>
      <text x="20" y="98" font-size="13" fill="#67727e" textLength="196" lengthAdjust="spacingAndGlyphs">corre&#231;&#227;o &#183; Java 21 &#183; Spring</text>
      <text x="20" y="144" font-size="13" fill="#67727e">16 testes JUnit</text>
    </g>

    <!-- legenda base -->
    <text x="640" y="536" text-anchor="middle" font-size="13" fill="#67727e">5 ferramentas independentes &#8212; cada uma cobre uma frente do OWASP Top 10 &#183; links na tabela abaixo</text>
  </g>
</svg>
