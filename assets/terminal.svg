<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 336" width="920" height="336" role="img" aria-label="Exemplo de saida do Sentinela">
  <rect x="1" y="1" width="918" height="334" rx="14" fill="#0b0f14" stroke="#212a34"/>
  <path d="M1 15 A14 14 0 0 1 15 1 H905 A14 14 0 0 1 919 15 V44 H1 Z" fill="#0f141b"/>
  <line x1="1" y1="44" x2="919" y2="44" stroke="#212a34"/>
  <circle cx="26" cy="22.5" r="6" fill="#f87171"/>
  <circle cx="46" cy="22.5" r="6" fill="#f59e0b"/>
  <circle cx="66" cy="22.5" r="6" fill="#2dd4bf"/>
  <text x="460" y="27" text-anchor="middle" font-family="'JetBrains Mono',ui-monospace,Menlo,Consolas,monospace" font-size="13" fill="#67727e">sentinela &#8212; diagn&#243;stico n&#227;o-intrusivo</text>

  <g font-family="'JetBrains Mono', ui-monospace, 'SFMono-Regular', Menlo, Consolas, monospace" font-size="16">
    <text x="26" y="84"><tspan fill="#2dd4bf">paulo@appsec</tspan><tspan fill="#67727e">:</tspan><tspan fill="#38bdf8">~</tspan><tspan fill="#67727e">$</tspan><tspan fill="#e6edf3"> sentinela scan cliente.com.br --formato html</tspan></text>

    <text x="26" y="120" fill="#8b96a3">TLS 1.3 &#183; HSTS preload &#183; certificado v&#225;lido</text>
    <text x="560" y="120" fill="#2dd4bf" font-weight="700">[ OK ]</text>

    <text x="26" y="148" fill="#8b96a3">Cabe&#231;alho CSP ausente</text>
    <text x="560" y="148" fill="#f59e0b" font-weight="700">[ M&#201;DIO ]</text>
    <text x="700" y="148" fill="#4b5663">OWASP A02</text>

    <text x="26" y="176" fill="#8b96a3">Cookie de sess&#227;o sem HttpOnly</text>
    <text x="560" y="176" fill="#f87171" font-weight="700">[ ALTO ]</text>
    <text x="700" y="176" fill="#4b5663">OWASP A01</text>

    <text x="26" y="204" fill="#8b96a3">CORS reflete Origin com credenciais</text>
    <text x="560" y="204" fill="#f87171" font-weight="700">[ ALTO ]</text>
    <text x="700" y="204" fill="#4b5663">OWASP A01</text>

    <text x="26" y="232" fill="#8b96a3">SPF/DMARC ausentes (vetor de phishing)</text>
    <text x="560" y="232" fill="#f59e0b" font-weight="700">[ M&#201;DIO ]</text>
    <text x="700" y="232" fill="#4b5663">OWASP A04</text>

    <text x="26" y="268" fill="#8b96a3">relat&#243;rio salvo:<tspan fill="#38bdf8"> relatorio-cliente.html</tspan></text>
    <text x="26" y="300"><tspan fill="#2dd4bf">paulo@appsec</tspan><tspan fill="#67727e">:</tspan><tspan fill="#38bdf8">~</tspan><tspan fill="#67727e">$</tspan></text>
  </g>

  <rect x="174" y="289" width="9" height="15" fill="#2dd4bf">
    <animate attributeName="opacity" values="1;1;0;0" keyTimes="0;0.5;0.5;1" dur="1.1s" repeatCount="indefinite"/>
  </rect>
</svg>
