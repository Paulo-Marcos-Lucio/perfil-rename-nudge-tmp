<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 120" width="1280" height="120" role="img" aria-label="Painel de telemetria: 5 ferramentas abertas, 340+ testes automatizados, licen&#231;a MIT com CI verde em todos os reposit&#243;rios, mapeamento OWASP Top 10 e LGPD art. 46">
  <defs>
    <linearGradient id="ink" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#e6edf3"/>
      <stop offset="1" stop-color="#b9c4cf"/>
    </linearGradient>
    <!-- brand VERTICAL em userSpaceOnUse (y 37-55 = altura do glifo '+'): o arco teal-sky-indigo
         completo cai sobre o glifo em qualquer SO, sem depender da posi&#231;&#227;o x do texto -->
    <linearGradient id="brand" gradientUnits="userSpaceOnUse" x1="480" y1="37" x2="480" y2="55">
      <stop offset="0" stop-color="#2dd4bf"/>
      <stop offset="0.52" stop-color="#38bdf8"/>
      <stop offset="1" stop-color="#818cf8"/>
    </linearGradient>
    <linearGradient id="pulse" gradientUnits="userSpaceOnUse" x1="20" y1="112" x2="1260" y2="112">
      <stop offset="0" stop-color="#2dd4bf"/>
      <stop offset="1" stop-color="#38bdf8"/>
    </linearGradient>
    <radialGradient id="glowT" cx="0.15" cy="0.12" r="0.9">
      <stop offset="0" stop-color="#2dd4bf" stop-opacity="0.22"/>
      <stop offset="1" stop-color="#2dd4bf" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowI" cx="0.90" cy="0.95" r="0.95">
      <stop offset="0" stop-color="#818cf8" stop-opacity="0.20"/>
      <stop offset="1" stop-color="#818cf8" stop-opacity="0"/>
    </radialGradient>
    <clipPath id="panel"><rect x="2" y="2" width="1276" height="116" rx="13"/></clipPath>
  </defs>

  <!-- painel externo (recorte digno no tema claro) -->
  <rect x="1" y="1" width="1278" height="118" rx="14" fill="#0b0f14" stroke="#212a34"/>

  <!-- banda de instrumentos: um degrau abaixo do chrome -->
  <rect x="16" y="12" width="1248" height="92" rx="10" fill="#0e1420"/>

  <!-- luz de canto contida (teal + indigo, est&#225;tica, clipada no painel) -->
  <g clip-path="url(#panel)">
    <rect x="2" y="2" width="1276" height="116" fill="url(#glowT)"/>
    <rect x="2" y="2" width="1276" height="116" fill="url(#glowI)"/>
  </g>

  <!-- hairlines verticais separando os quatro m&#243;dulos -->
  <g stroke="#212a34" stroke-width="1">
    <line x1="320.5" y1="12" x2="320.5" y2="104"/>
    <line x1="640.5" y1="12" x2="640.5" y2="104"/>
    <line x1="960.5" y1="12" x2="960.5" y2="104"/>
  </g>

  <!-- fiduciais de alinhamento: tick no topo de cada m&#243;dulo -->
  <path d="M160 12 v4 M480 12 v4 M800 12 v4 M1120 12 v4" stroke="#2c3742" stroke-width="1" fill="none"/>

  <g font-family="'JetBrains Mono','Cascadia Code',ui-monospace,'SF Mono',Menlo,Consolas,monospace">
    <!-- n&#250;meros: p&#244;ster completo em t=0 -->
    <g font-size="34" font-weight="700" text-anchor="middle" fill="url(#ink)">
      <text x="160" y="58">5</text>
      <text x="480" y="58">340<tspan fill="url(#brand)">+</tspan></text>
      <text x="800" y="58">MIT</text>
      <text x="1120" y="58">OWASP</text>
    </g>

    <!-- labels: p&#244;ster completo em t=0. M&#243;dulo 3 ancorado em x fixo (folga garantida
         at&#233; a hairline de 960 mesmo com fonte 8% mais larga) -->
    <g font-size="13" letter-spacing="2" fill="#67727e">
      <text x="160" y="84" text-anchor="middle">FERRAMENTAS ABERTAS</text>
      <text x="480" y="84" text-anchor="middle">TESTES AUTOMATIZADOS</text>
      <text x="668" y="84">LICEN&#199;A &#183; CI VERDE EM TODOS</text>
      <text x="1120" y="84" text-anchor="middle">TOP 10 &#183; LGPD ART. 46</text>
    </g>
  </g>

  <!-- micro-barras: contador como barra; one-shot, congelam 100% cheias -->
  <g>
    <rect x="100" y="96.5" width="120" height="3" rx="2" fill="#212a34"/>
    <rect x="100" y="96.5" width="0" height="3" rx="2" fill="#2dd4bf">
      <animate attributeName="width" values="0;120" keyTimes="0;1" dur="1.2s" begin="0.3s" fill="freeze" calcMode="spline" keySplines="0.2 0 0.2 1"/>
    </rect>
    <rect x="420" y="96.5" width="120" height="3" rx="2" fill="#212a34"/>
    <rect x="420" y="96.5" width="0" height="3" rx="2" fill="#2dd4bf">
      <animate attributeName="width" values="0;120" keyTimes="0;1" dur="1.2s" begin="0.5s" fill="freeze" calcMode="spline" keySplines="0.2 0 0.2 1"/>
    </rect>
    <rect x="1060" y="96.5" width="120" height="3" rx="2" fill="#212a34"/>
    <rect x="1060" y="96.5" width="0" height="3" rx="2" fill="#2dd4bf">
      <animate attributeName="width" values="0;120" keyTimes="0;1" dur="1.2s" begin="0.7s" fill="freeze" calcMode="spline" keySplines="0.2 0 0.2 1"/>
    </rect>
  </g>

  <!-- m&#243;dulo 3: LED ao lado do label (bloom + n&#250;cleo, respira&#231;&#227;o 3s, loop fecha em 1) -->
  <g>
    <circle cx="654" cy="79.5" r="8" fill="#2dd4bf" opacity="0.14"/>
    <circle cx="654" cy="79.5" r="4" fill="#2dd4bf"/>
    <animate attributeName="opacity" values="1;0.35;1" keyTimes="0;0.5;1" dur="3s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
  </g>

  <!-- rail base: path de estilo + overlay de pulso (dois paths, mecanismo do divider).
       dasharray 120+1120 = 1240 = comprimento do path; offset anda 1240 por ciclo: loop sem emenda -->
  <path d="M20 112 H1260" stroke="#18212c" stroke-width="1" fill="none"/>
  <path d="M20 112 H1260" stroke="url(#pulse)" stroke-width="2" stroke-linecap="round" fill="none" opacity="0.15" stroke-dasharray="120 1120">
    <animate attributeName="stroke-dashoffset" values="1240;0" dur="7.5s" calcMode="linear" repeatCount="indefinite"/>
  </path>
  <path d="M20 109 v6 M1260 109 v6" stroke="#2c3742" stroke-width="1" fill="none"/>
</svg>
