<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 210 46" width="210" height="46" role="img" aria-label="Todos os reposit&#243;rios de Paulo Marcos Lucio no GitHub">
  <title>Reposit&#243;rios &#8212; Paulo Marcos Lucio no GitHub</title>
  <defs>
    <linearGradient id="brand" x1="18" y1="13" x2="36" y2="33" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#2dd4bf"/>
      <stop offset="0.52" stop-color="#38bdf8"/>
      <stop offset="1" stop-color="#818cf8"/>
    </linearGradient>
    <linearGradient id="top" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.05"/>
      <stop offset="0.55" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="ht" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#2dd4bf" stop-opacity="0.15"/>
      <stop offset="1" stop-color="#2dd4bf" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="hi" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#818cf8" stop-opacity="0.10"/>
      <stop offset="1" stop-color="#818cf8" stop-opacity="0"/>
    </radialGradient>
    <clipPath id="clip"><rect x="0.5" y="0.5" width="209" height="45" rx="10"/></clipPath>
  </defs>

  <!-- chrome do bot&#227;o: painel dark, rx 10, borda hairline (recorte digno no tema claro) -->
  <rect x="0.5" y="0.5" width="209" height="45" rx="10" fill="#0f141b" stroke="#212a34" stroke-width="1"/>

  <!-- profundidade contida: halo teal sob o &#237;cone, halo &#237;ndigo no canto oposto, luz de topo -->
  <g clip-path="url(#clip)">
    <circle cx="27" cy="24" r="34" fill="url(#ht)"/>
    <circle cx="196" cy="42" r="40" fill="url(#hi)"/>
    <rect x="0.5" y="0.5" width="209" height="22" fill="url(#top)"/>
  </g>
  <rect x="1.5" y="1.5" width="207" height="43" rx="9" fill="none" stroke="#ffffff" stroke-opacity="0.04" stroke-width="1"/>

  <!-- &#237;cone git branch: 2 n&#243;s r=3.5 + linha vertical + curva de merge; sub-tra&#231;o teal = brilho sem filtro -->
  <g fill="none" stroke-linecap="round" stroke-linejoin="round">
    <g stroke="#2dd4bf" stroke-opacity="0.20" stroke-width="5">
      <path d="M21.5 14.5 V25"/>
      <path d="M32.5 21 a7.5 7.5 0 0 1 -7.5 7.5"/>
      <circle cx="21.5" cy="28.5" r="3.5"/>
      <circle cx="32.5" cy="17.5" r="3.5"/>
    </g>
    <g stroke="url(#brand)" stroke-width="2">
      <path d="M21.5 14.5 V25"/>
      <path d="M32.5 21 a7.5 7.5 0 0 1 -7.5 7.5"/>
      <circle cx="21.5" cy="28.5" r="3.5"/>
      <circle cx="32.5" cy="17.5" r="3.5"/>
    </g>
  </g>

  <!-- copy -->
  <text x="123" y="27.7" text-anchor="middle" font-family="'JetBrains Mono','Cascadia Code',ui-monospace,'SF Mono',Menlo,Consolas,monospace" font-size="13" font-weight="700" letter-spacing="1.5" fill="#e6edf3">REPOSIT&#211;RIOS</text>
</svg>
