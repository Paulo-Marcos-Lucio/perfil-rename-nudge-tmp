<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 470" width="1280" height="470" role="img" aria-label="Como trabalho: pipeline em 4 etapas &#8212; diagn&#243;stico, corre&#231;&#227;o e hardening, reteste, evid&#234;ncia LGPD &#8212; com a entrega de cada servi&#231;o">
  <title>Como trabalho &#8212; pipeline em 4 etapas: diagn&#243;stico, corre&#231;&#227;o e hardening, reteste, evid&#234;ncia LGPD</title>
  <defs>
    <!-- brand em userSpace: gradiente correto em traços retos (bbox zero) e
         progressão teal→indigo ao longo da página, como no hero -->
    <linearGradient id="brandU" x1="36" y1="0" x2="1244" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#2dd4bf"/>
      <stop offset="0.52" stop-color="#38bdf8"/>
      <stop offset="1" stop-color="#818cf8"/>
    </linearGradient>
    <radialGradient id="glowT" cx="0.15" cy="0.12" r="0.75">
      <stop offset="0" stop-color="#2dd4bf" stop-opacity="1"/>
      <stop offset="1" stop-color="#2dd4bf" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowI" cx="0.90" cy="0.95" r="0.75">
      <stop offset="0" stop-color="#818cf8" stop-opacity="1"/>
      <stop offset="1" stop-color="#818cf8" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="halo" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#2dd4bf" stop-opacity="0.55"/>
      <stop offset="0.55" stop-color="#2dd4bf" stop-opacity="0.20"/>
      <stop offset="1" stop-color="#2dd4bf" stop-opacity="0"/>
    </radialGradient>
    <pattern id="g34" width="34" height="34" patternUnits="userSpaceOnUse">
      <path d="M34 0 H0 V34" fill="none" stroke="#18212c" stroke-width="1"/>
    </pattern>
    <clipPath id="panel"><rect x="1" y="1" width="1278" height="468" rx="16"/></clipPath>
  </defs>

  <!-- painel -->
  <rect x="1" y="1" width="1278" height="468" rx="16" fill="#0b0f14" stroke="#212a34"/>

  <g clip-path="url(#panel)">
    <rect x="1" y="1" width="1278" height="468" fill="url(#g34)" opacity="0.35"/>
    <rect x="1" y="1" width="1278" height="468" fill="url(#glowT)" opacity="0.14">
      <animate attributeName="opacity" values="0.14;0.22;0.14" dur="9s" repeatCount="indefinite"/>
    </rect>
    <rect x="1" y="1" width="1278" height="468" fill="url(#glowI)" opacity="0.14">
      <animate attributeName="opacity" values="0.14;0.22;0.14" dur="9s" begin="-4.5s" repeatCount="indefinite"/>
    </rect>

    <!-- margin&#225;lia -->
    <g font-family="'JetBrains Mono','Cascadia Code',ui-monospace,'SF Mono',Menlo,Consolas,monospace" font-size="11" fill="#4b5663">
      <text x="36" y="35" letter-spacing="2">// COMO TRABALHO &#183; O QUE ENTREGO</text>
      <text x="1244" y="35" text-anchor="end">paulo-marcos-lucio.github.io &#8594;</text>
    </g>

    <!-- trilha do pipeline + setas de cota -->
    <path d="M90 120 H1190" fill="none" stroke="#1f2f3a" stroke-width="2" stroke-linecap="round"/>
    <g stroke="#2c3742" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
      <path d="M90 113 V127 M1190 113 V127"/>
      <g transform="translate(340,120)"><path d="M-10 -4.5 L-3 0 L-10 4.5 M3 -4.5 L10 0 L3 4.5"/></g>
      <g transform="translate(640,120)"><path d="M-10 -4.5 L-3 0 L-10 4.5 M3 -4.5 L10 0 L3 4.5"/></g>
      <g transform="translate(940,120)"><path d="M-10 -4.5 L-3 0 L-10 4.5 M3 -4.5 L10 0 L3 4.5"/></g>
    </g>

    <!-- an&#233;is de pulso: blip com decaimento &#224; passagem do ponto (f=0.09/0.36/0.64/0.91) -->
    <g fill="none" stroke="url(#brandU)" stroke-width="2">
      <circle cx="190" cy="120" r="10" opacity="0">
        <animate attributeName="opacity" values="0;0;0.4;0;0" keyTimes="0;0.09;0.1;0.21;1" dur="8s" repeatCount="indefinite"/>
        <animate attributeName="r" values="10;10;24;24" keyTimes="0;0.09;0.21;1" dur="8s" repeatCount="indefinite"/>
      </circle>
      <circle cx="490" cy="120" r="10" opacity="0">
        <animate attributeName="opacity" values="0;0;0.4;0;0" keyTimes="0;0.36;0.37;0.48;1" dur="8s" repeatCount="indefinite"/>
        <animate attributeName="r" values="10;10;24;24" keyTimes="0;0.36;0.48;1" dur="8s" repeatCount="indefinite"/>
      </circle>
      <circle cx="790" cy="120" r="10" opacity="0">
        <animate attributeName="opacity" values="0;0;0.4;0;0" keyTimes="0;0.64;0.65;0.76;1" dur="8s" repeatCount="indefinite"/>
        <animate attributeName="r" values="10;10;24;24" keyTimes="0;0.64;0.76;1" dur="8s" repeatCount="indefinite"/>
      </circle>
      <circle cx="1090" cy="120" r="10" opacity="0">
        <animate attributeName="opacity" values="0;0;0.4;0" keyTimes="0;0.91;0.92;1" dur="8s" repeatCount="indefinite"/>
        <animate attributeName="r" values="10;10;24" keyTimes="0;0.91;1" dur="8s" repeatCount="indefinite"/>
      </circle>
    </g>

    <!-- marcos: acendem quando o ponto os toca -->
    <g font-family="'JetBrains Mono','Cascadia Code',ui-monospace,'SF Mono',Menlo,Consolas,monospace" text-anchor="middle">
      <g>
        <circle cx="190" cy="120" r="10" fill="#0b0f14" stroke="url(#brandU)" stroke-width="2" stroke-opacity="1">
          <animate attributeName="stroke-opacity" values="0.5;0.5;1;0.5;0.5" keyTimes="0;0.04;0.09;0.14;1" dur="8s" repeatCount="indefinite"/>
        </circle>
        <circle cx="190" cy="120" r="3" fill="url(#brandU)" opacity="1">
          <animate attributeName="opacity" values="0.45;0.45;1;0.45;0.45" keyTimes="0;0.04;0.09;0.14;1" dur="8s" repeatCount="indefinite"/>
        </circle>
        <text x="190" y="97" font-size="13" font-weight="700" fill="#67727e">01</text>
        <text x="190" y="160" font-size="14" font-weight="700" letter-spacing="1" fill="#e6edf3">DIAGN&#211;STICO</text>
      </g>
      <g>
        <circle cx="490" cy="120" r="10" fill="#0b0f14" stroke="url(#brandU)" stroke-width="2" stroke-opacity="1">
          <animate attributeName="stroke-opacity" values="0.5;0.5;1;0.5;0.5" keyTimes="0;0.31;0.36;0.41;1" dur="8s" repeatCount="indefinite"/>
        </circle>
        <circle cx="490" cy="120" r="3" fill="url(#brandU)" opacity="1">
          <animate attributeName="opacity" values="0.45;0.45;1;0.45;0.45" keyTimes="0;0.31;0.36;0.41;1" dur="8s" repeatCount="indefinite"/>
        </circle>
        <text x="490" y="97" font-size="13" font-weight="700" fill="#67727e">02</text>
        <text x="490" y="160" font-size="14" font-weight="700" letter-spacing="1" fill="#e6edf3">CORRE&#199;&#195;O &amp; HARDENING</text>
      </g>
      <g>
        <circle cx="790" cy="120" r="10" fill="#0b0f14" stroke="url(#brandU)" stroke-width="2" stroke-opacity="1">
          <animate attributeName="stroke-opacity" values="0.5;0.5;1;0.5;0.5" keyTimes="0;0.59;0.64;0.69;1" dur="8s" repeatCount="indefinite"/>
        </circle>
        <circle cx="790" cy="120" r="3" fill="url(#brandU)" opacity="1">
          <animate attributeName="opacity" values="0.45;0.45;1;0.45;0.45" keyTimes="0;0.59;0.64;0.69;1" dur="8s" repeatCount="indefinite"/>
        </circle>
        <text x="790" y="97" font-size="13" font-weight="700" fill="#67727e">03</text>
        <text x="790" y="160" font-size="14" font-weight="700" letter-spacing="1" fill="#e6edf3">RETESTE</text>
      </g>
      <g>
        <circle cx="1090" cy="120" r="10" fill="#0b0f14" stroke="url(#brandU)" stroke-width="2" stroke-opacity="1">
          <animate attributeName="stroke-opacity" values="0.5;0.5;1;0.5;0.5" keyTimes="0;0.86;0.91;0.96;1" dur="8s" repeatCount="indefinite"/>
        </circle>
        <circle cx="1090" cy="120" r="3" fill="url(#brandU)" opacity="1">
          <animate attributeName="opacity" values="0.45;0.45;1;0.45;0.45" keyTimes="0;0.86;0.91;0.96;1" dur="8s" repeatCount="indefinite"/>
        </circle>
        <text x="1090" y="97" font-size="13" font-weight="700" fill="#67727e">04</text>
        <text x="1090" y="160" font-size="14" font-weight="700" letter-spacing="1" fill="#e6edf3">EVID&#202;NCIA LGPD</text>
      </g>
    </g>

    <!-- ponto de luz (fade nas pontas = loop sem emenda) -->
    <g opacity="0">
      <circle r="14" fill="url(#halo)"/>
      <circle r="4" fill="#2dd4bf" opacity="0.9"/>
      <circle r="4" fill="#ffffff" opacity="0.5"/>
      <animateMotion path="M90,120 L1190,120" dur="8s" calcMode="linear" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.04;0.96;1" dur="8s" repeatCount="indefinite"/>
    </g>

    <!-- cart&#227;o 01 -->
    <g>
      <rect x="36" y="218" width="280" height="210" rx="12" fill="#0e1420" stroke="#212a34"/>
      <text x="292" y="251" text-anchor="end" font-family="'JetBrains Mono','Cascadia Code',ui-monospace,'SF Mono',Menlo,Consolas,monospace" font-size="13" font-weight="700" fill="#4b5663">01</text>
      <g transform="translate(60,240)" fill="none" stroke="url(#brandU)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="11" cy="11" r="8"/>
        <path d="M17 17 L24.5 24.5"/>
      </g>
      <g font-family="'JetBrains Mono','Cascadia Code',ui-monospace,'SF Mono',Menlo,Consolas,monospace">
        <text x="60" y="302" font-size="15" font-weight="700" fill="#e6edf3">Diagn&#243;stico de</text>
        <text x="60" y="323" font-size="15" font-weight="700" fill="#e6edf3">vulnerabilidades web</text>
        <text x="60" y="352" font-size="13" fill="#8b96a3">relat&#243;rio com severidade,</text>
        <text x="60" y="372" font-size="13" fill="#8b96a3">evid&#234;ncia e remedia&#231;&#227;o</text>
        <text x="60" y="392" font-size="13" fill="#8b96a3">priorizada</text>
      </g>
      <animate attributeName="opacity" values="0;0;1" keyTimes="0;0.484;1" dur="0.62s" begin="0s" fill="freeze"/>
      <animateTransform attributeName="transform" type="translate" values="0 6;0 6;0 0" keyTimes="0;0.484;1" dur="0.62s" begin="0s" fill="freeze"/>
    </g>

    <!-- cart&#227;o 02 -->
    <g>
      <rect x="348" y="218" width="280" height="210" rx="12" fill="#0e1420" stroke="#212a34"/>
      <text x="604" y="251" text-anchor="end" font-family="'JetBrains Mono','Cascadia Code',ui-monospace,'SF Mono',Menlo,Consolas,monospace" font-size="13" font-weight="700" fill="#4b5663">02</text>
      <g transform="translate(372,240)" fill="none" stroke="url(#brandU)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M13 1.5 L23.5 5.5 V12.5 C23.5 19 19.3 23.2 13 25.5 C6.7 23.2 2.5 19 2.5 12.5 V5.5 Z"/>
        <circle cx="13" cy="10.5" r="2.6"/>
        <path d="M13 13.1 V17"/>
      </g>
      <g font-family="'JetBrains Mono','Cascadia Code',ui-monospace,'SF Mono',Menlo,Consolas,monospace">
        <text x="372" y="302" font-size="15" font-weight="700" fill="#e6edf3">Corre&#231;&#227;o &amp; hardening</text>
        <text x="372" y="352" font-size="13" fill="#8b96a3">CSP, HSTS, TLS moderno,</text>
        <text x="372" y="372" font-size="13" fill="#8b96a3">cookies seguros,</text>
        <text x="372" y="392" font-size="13" fill="#8b96a3">CORS restrito</text>
      </g>
      <animate attributeName="opacity" values="0;0;1" keyTimes="0;0.584;1" dur="0.77s" begin="0s" fill="freeze"/>
      <animateTransform attributeName="transform" type="translate" values="0 6;0 6;0 0" keyTimes="0;0.584;1" dur="0.77s" begin="0s" fill="freeze"/>
    </g>

    <!-- cart&#227;o 03 -->
    <g>
      <rect x="660" y="218" width="280" height="210" rx="12" fill="#0e1420" stroke="#212a34"/>
      <text x="916" y="251" text-anchor="end" font-family="'JetBrains Mono','Cascadia Code',ui-monospace,'SF Mono',Menlo,Consolas,monospace" font-size="13" font-weight="700" fill="#4b5663">03</text>
      <g transform="translate(684,240)" fill="none" stroke="url(#brandU)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M24.9 4.3 V10.8 H18.4"/>
        <path d="M3.8 9.8 A9.75 9.75 0 0 1 19.9 6.1 L24.9 10.8"/>
        <path d="M1.1 21.7 V15.2 H7.6"/>
        <path d="M1.1 15.2 L6.1 19.9 A9.75 9.75 0 0 0 22.2 16.2"/>
      </g>
      <g font-family="'JetBrains Mono','Cascadia Code',ui-monospace,'SF Mono',Menlo,Consolas,monospace">
        <text x="684" y="302" font-size="15" font-weight="700" fill="#e6edf3">Reteste &amp;</text>
        <text x="684" y="323" font-size="15" font-weight="700" fill="#e6edf3">acompanhamento</text>
        <text x="684" y="352" font-size="13" fill="#8b96a3">comprova&#231;&#227;o da redu&#231;&#227;o</text>
        <text x="684" y="372" font-size="13" fill="#8b96a3">de risco, varredura</text>
        <text x="684" y="392" font-size="13" fill="#8b96a3">recorrente por release</text>
      </g>
      <animate attributeName="opacity" values="0;0;1" keyTimes="0;0.652;1" dur="0.92s" begin="0s" fill="freeze"/>
      <animateTransform attributeName="transform" type="translate" values="0 6;0 6;0 0" keyTimes="0;0.652;1" dur="0.92s" begin="0s" fill="freeze"/>
    </g>

    <!-- cart&#227;o 04 -->
    <g>
      <rect x="972" y="218" width="280" height="210" rx="12" fill="#0e1420" stroke="#212a34"/>
      <text x="1228" y="251" text-anchor="end" font-family="'JetBrains Mono','Cascadia Code',ui-monospace,'SF Mono',Menlo,Consolas,monospace" font-size="13" font-weight="700" fill="#4b5663">04</text>
      <g transform="translate(996,240)" fill="none" stroke="url(#brandU)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M13 3.5 V21.5"/>
        <path d="M8.5 24 H17.5"/>
        <path d="M4.5 7.5 H21.5"/>
        <path d="M4.5 7.5 L1 14.5 M4.5 7.5 L8 14.5"/>
        <path d="M1 14.5 A3.5 3.5 0 0 0 8 14.5"/>
        <path d="M21.5 7.5 L18 14.5 M21.5 7.5 L25 14.5"/>
        <path d="M18 14.5 A3.5 3.5 0 0 0 25 14.5"/>
      </g>
      <g font-family="'JetBrains Mono','Cascadia Code',ui-monospace,'SF Mono',Menlo,Consolas,monospace">
        <text x="996" y="302" font-size="15" font-weight="700" fill="#e6edf3">Adequa&#231;&#227;o &#224; LGPD</text>
        <text x="996" y="323" font-size="15" font-weight="700" fill="#e6edf3">(art. 46)</text>
        <text x="996" y="352" font-size="13" fill="#8b96a3">evid&#234;ncia datada e</text>
        <text x="996" y="372" font-size="13" fill="#8b96a3">audit&#225;vel das medidas</text>
        <text x="996" y="392" font-size="13" fill="#8b96a3">t&#233;cnicas</text>
      </g>
      <animate attributeName="opacity" values="0;0;1" keyTimes="0;0.701;1" dur="1.07s" begin="0s" fill="freeze"/>
      <animateTransform attributeName="transform" type="translate" values="0 6;0 6;0 0" keyTimes="0;0.701;1" dur="1.07s" begin="0s" fill="freeze"/>
    </g>
  </g>
</svg>
