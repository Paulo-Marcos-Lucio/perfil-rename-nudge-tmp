<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 210 46" width="210" height="46" role="img" aria-label="LinkedIn de Paulo Marcos Lucio">
  <title>LinkedIn &#8212; Paulo Marcos Lucio</title>
  <defs>
    <linearGradient id="brand" x1="18" y1="13" x2="38" y2="33" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#2dd4bf"/>
      <stop offset="0.52" stop-color="#38bdf8"/>
      <stop offset="1" stop-color="#818cf8"/>
    </linearGradient>
    <linearGradient id="top" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.05"/>
      <stop offset="0.55" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="ht" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#2dd4bf" stop-opacity="0.15"/>
      <stop offset="1" stop-color="#2dd4bf" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="hi" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#818cf8" stop-opacity="0.10"/>
      <stop offset="1" stop-color="#818cf8" stop-opacity="0"/>
    </radialGradient>
    <clipPath id="clip"><rect x="0.5" y="0.5" width="209" height="45" rx="10"/></clipPath>
  </defs>

  <!-- painel v2: template unico dos 4 botoes (x 0.5, 209x45, rx 10, borda hairline) -->
  <rect x="0.5" y="0.5" width="209" height="45" rx="10" fill="#0f141b" stroke="#212a34" stroke-width="1"/>

  <!-- profundidade contida: halo teal sob o icone, halo indigo no canto oposto, luz de topo -->
  <g clip-path="url(#clip)">
    <circle cx="28" cy="23" r="34" fill="url(#ht)"/>
    <circle cx="196" cy="42" r="40" fill="url(#hi)"/>
    <rect x="0.5" y="0.5" width="209" height="22" fill="url(#top)"/>
  </g>
  <rect x="1.5" y="1.5" width="207" height="43" rx="9" fill="none" stroke="#ffffff" stroke-opacity="0.04" stroke-width="1"/>

  <!-- icone: glifo 'in' proprio (nunca o logo oficial), moldura 20x20 na grade x=18 / centro 28; sub-traco teal = brilho sem filtro -->
  <g fill="none" stroke-linecap="round" stroke-linejoin="round">
    <rect x="18" y="13" width="20" height="20" rx="5" stroke="#2dd4bf" stroke-opacity="0.20" stroke-width="5"/>
    <rect x="18" y="13" width="20" height="20" rx="5" stroke="url(#brand)" stroke-width="2"/>
  </g>
  <text x="28" y="28" text-anchor="middle" font-family="'JetBrains Mono','Cascadia Code',ui-monospace,'SF Mono',Menlo,Consolas,monospace" font-size="15" font-weight="700" fill="none" stroke="#2dd4bf" stroke-opacity="0.20" stroke-width="3">in</text>
  <text x="28" y="28" text-anchor="middle" font-family="'JetBrains Mono','Cascadia Code',ui-monospace,'SF Mono',Menlo,Consolas,monospace" font-size="15" font-weight="700" fill="url(#brand)">in</text>

  <!-- copy: centro 124 + tracking/2 (8 chars = ls 2) -->
  <text x="125" y="27.7" text-anchor="middle" font-family="'JetBrains Mono','Cascadia Code',ui-monospace,'SF Mono',Menlo,Consolas,monospace" font-size="13" font-weight="700" letter-spacing="2" fill="#e6edf3">LINKEDIN</text>
</svg>
