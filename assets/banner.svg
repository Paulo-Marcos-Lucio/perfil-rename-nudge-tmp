<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 320" width="1280" height="320" role="img" aria-label="Paulo Marcos Lucio — Seguranca de Aplicacoes Web (AppSec)">
  <defs>
    <linearGradient id="brand" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#2dd4bf"/>
      <stop offset="0.52" stop-color="#38bdf8"/>
      <stop offset="1" stop-color="#818cf8"/>
    </linearGradient>
    <linearGradient id="ink" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#e6edf3"/>
      <stop offset="1" stop-color="#b9c4cf"/>
    </linearGradient>
    <radialGradient id="glowA" cx="0.16" cy="0.18" r="0.9">
      <stop offset="0" stop-color="#2dd4bf" stop-opacity="0.22"/>
      <stop offset="1" stop-color="#2dd4bf" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowB" cx="0.92" cy="0.96" r="0.95">
      <stop offset="0" stop-color="#818cf8" stop-opacity="0.20"/>
      <stop offset="1" stop-color="#818cf8" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid" width="34" height="34" patternUnits="userSpaceOnUse">
      <path d="M34 0 H0 V34" fill="none" stroke="#18212c" stroke-width="1"/>
    </pattern>
    <filter id="soft" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="8"/>
    </filter>
    <clipPath id="barclip"><rect x="0" y="314" width="1280" height="6"/></clipPath>
  </defs>

  <rect width="1280" height="320" fill="#0b0f14"/>
  <rect width="1280" height="320" fill="url(#grid)" opacity="0.55"/>
  <rect width="1280" height="320" fill="url(#glowA)"/>
  <rect width="1280" height="320" fill="url(#glowB)"/>

  <g stroke="#2dd4bf" stroke-width="2" fill="none" opacity="0.5">
    <path d="M28 22 h34 M28 22 v34"/>
    <path d="M1252 22 h-34 M1252 22 v34"/>
    <path d="M28 298 h34 M28 298 v-34"/>
    <path d="M1252 298 h-34 M1252 298 v-34"/>
  </g>

  <g transform="translate(74,74) scale(2.62)">
    <path d="M32 8 L52 16 V32 C52 44 43 52 32 56 C21 52 12 44 12 32 V16 Z" fill="url(#brand)" filter="url(#soft)" opacity="0.5"/>
    <path d="M32 8 L52 16 V32 C52 44 43 52 32 56 C21 52 12 44 12 32 V16 Z" fill="url(#brand)"/>
    <path d="M23 32.5 l6.5 6.5 L42 26.5" fill="none" stroke="#04110f" stroke-width="4.5" stroke-linecap="round" stroke-linejoin="round"/>
    <animate attributeName="opacity" values="0.9;1;0.9" dur="4.2s" repeatCount="indefinite"/>
  </g>

  <g font-family="'Segoe UI', -apple-system, BlinkMacSystemFont, Roboto, Helvetica, Arial, sans-serif">
    <text x="300" y="112" font-family="'JetBrains Mono', ui-monospace, 'SFMono-Regular', Menlo, Consolas, monospace" font-size="16.5" letter-spacing="4" fill="#2dd4bf" font-weight="600">SEGURAN&#199;A DE APLICA&#199;&#213;ES WEB &#183; APPSEC</text>
    <text x="298" y="177" font-size="62" font-weight="800" fill="url(#ink)" letter-spacing="-1">Paulo Marcos Lucio</text>
    <rect x="300" y="197" width="152" height="4" rx="2" fill="url(#brand)"/>
    <text x="300" y="237" font-size="25" fill="#c4cdd6" font-weight="500">Diagn&#243;stico e corre&#231;&#227;o de vulnerabilidades web</text>
    <text x="300" y="273" font-family="'JetBrains Mono', ui-monospace, 'SFMono-Regular', Menlo, Consolas, monospace" font-size="16" fill="#67727e">OWASP Top 10 &#183; TLS/PKI &#183; Cabe&#231;alhos &#183; CORS &#183; DNS &#183; LGPD</text>
  </g>

  <text x="1252" y="44" text-anchor="end" font-family="'JetBrains Mono', ui-monospace, Menlo, Consolas, monospace" font-size="14" fill="#8b96a3">// paulo-marcos-lucio.github.io</text>

  <rect x="0" y="314" width="1280" height="6" fill="url(#brand)"/>
  <g clip-path="url(#barclip)">
    <rect x="-320" y="314" width="320" height="6" fill="#ffffff" opacity="0.5">
      <animate attributeName="x" values="-320;1280" dur="3.6s" repeatCount="indefinite"/>
    </rect>
  </g>
</svg>
