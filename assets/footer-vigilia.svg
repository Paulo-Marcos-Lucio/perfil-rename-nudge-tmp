<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 170" width="1280" height="170" role="img" aria-label="Fecho da p&#225;gina &#8212; &#233;tica de trabalho: diagn&#243;stico sob autoriza&#231;&#227;o e escopo definido; seguran&#231;a &#233; redu&#231;&#227;o de risco, n&#227;o promessa de perfei&#231;&#227;o. Prompt de terminal aguardando o pr&#243;ximo comando.">
  <title>Vig&#237;lia &#8212; &#233;tica de trabalho e prompt aguardando comando</title>
  <defs>
    <clipPath id="painel">
      <rect x="1" y="1" width="1278" height="168" rx="16"/>
    </clipPath>
    <clipPath id="faixa">
      <rect x="1" y="1" width="1278" height="6"/>
    </clipPath>
    <linearGradient id="brand" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#2dd4bf"/>
      <stop offset="0.52" stop-color="#38bdf8"/>
      <stop offset="1" stop-color="#818cf8"/>
    </linearGradient>
    <linearGradient id="brandInv" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#818cf8"/>
      <stop offset="0.48" stop-color="#38bdf8"/>
      <stop offset="1" stop-color="#2dd4bf"/>
    </linearGradient>
    <radialGradient id="gIndigo" cx="0.10" cy="0.08" r="0.85">
      <stop offset="0" stop-color="#818cf8" stop-opacity="0.16"/>
      <stop offset="1" stop-color="#818cf8" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="gTeal" cx="0.90" cy="0.92" r="0.85">
      <stop offset="0" stop-color="#2dd4bf" stop-opacity="0.17"/>
      <stop offset="1" stop-color="#2dd4bf" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="vinheta" cx="0.5" cy="0.5" r="0.72">
      <stop offset="0" stop-color="#000000" stop-opacity="0"/>
      <stop offset="0.55" stop-color="#000000" stop-opacity="0"/>
      <stop offset="1" stop-color="#000000" stop-opacity="0.35"/>
    </radialGradient>
    <filter id="soft" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="6"/>
    </filter>
  </defs>

  <!-- papel do painel -->
  <rect x="1" y="1" width="1278" height="168" rx="16" fill="#0b0f14"/>

  <!-- atmosfera: glows opostos ecoando a barra invertida (indigo NW, teal SE) + vinheta de fecho -->
  <g clip-path="url(#painel)">
    <rect x="1" y="1" width="1278" height="168" fill="url(#gIndigo)"/>
    <rect x="1" y="1" width="1278" height="168" fill="url(#gTeal)"/>
    <rect x="1" y="1" width="1278" height="168" fill="url(#vinheta)"/>

    <!-- barra superior: arco de cor da p&#225;gina se fecha &#8212; indigo &#8594; sky &#8594; teal -->
    <rect x="1" y="1" width="1278" height="6" fill="url(#brandInv)"/>
    <g clip-path="url(#faixa)">
      <rect x="1280" y="1" width="320" height="6" fill="#ffffff" opacity="0.5">
        <animate attributeName="x" from="1280" to="-320" dur="3.6s" calcMode="linear" repeatCount="indefinite"/>
      </rect>
    </g>
  </g>

  <!-- escudo 34px, centro vertical y=78 -->
  <g transform="translate(63.5,55.333) scale(0.70833)">
    <path d="M32 8 L52 16 V32 C52 44 43 52 32 56 C21 52 12 44 12 32 V16 Z" fill="url(#brand)" filter="url(#soft)" opacity="0.45"/>
    <path d="M32 8 L52 16 V32 C52 44 43 52 32 56 C21 52 12 44 12 32 V16 Z" fill="url(#brand)"/>
    <path d="M23 32.5 l6.5 6.5 L42 26.5" fill="none" stroke="#04110f" stroke-width="4.5" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- &#233;tica: a regra escrita do sistema -->
  <g font-family="'JetBrains Mono','Cascadia Code',ui-monospace,'SF Mono',Menlo,Consolas,monospace" font-size="15">
    <text x="130" y="68" fill="#c4cdd6" font-weight="700">Diagn&#243;stico sob autoriza&#231;&#227;o e escopo definido.</text>
    <text x="130" y="94" fill="#8b96a3">Seguran&#231;a &#233; redu&#231;&#227;o de risco &#8212; n&#227;o promessa de perfei&#231;&#227;o.</text>
  </g>

  <!-- hairline com ticks fiduciais -->
  <line x1="72" y1="118.5" x2="1208" y2="118.5" stroke="#18212c" stroke-width="1"/>
  <g stroke="#2c3742" stroke-width="1">
    <line x1="72.5" y1="115.5" x2="72.5" y2="121.5"/>
    <line x1="1207.5" y1="115.5" x2="1207.5" y2="121.5"/>
  </g>

  <!-- prompt final: vazio, aguardando o comando -->
  <g font-family="'JetBrains Mono','Cascadia Code',ui-monospace,'SF Mono',Menlo,Consolas,monospace" font-size="15">
    <text x="72" y="146" fill="#8b96a3">paulo@appsec:~$</text>
    <text x="1208" y="146" text-anchor="end" font-size="13" fill="#4b5663">S&#227;o Paulo, BR &#183; remote-first</text>
  </g>
  <rect x="214" y="134" width="9" height="16" fill="#2dd4bf">
    <animate attributeName="opacity" values="1;1;0;0" keyTimes="0;0.5;0.5;1" dur="1.1s" repeatCount="indefinite"/>
  </rect>

  <!-- recorte digno no tema claro: borda re-tra&#231;ada por cima da barra -->
  <rect x="1" y="1" width="1278" height="168" rx="16" fill="none" stroke="#212a34" stroke-width="1"/>
</svg>
